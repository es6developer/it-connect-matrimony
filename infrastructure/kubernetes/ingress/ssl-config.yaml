apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: cert-manager
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: devops@itconnectmatrimony.com
    privateKeySecretRef:
      name: letsencrypt-prod-private-key
    solvers:
      - http01:
          ingress:
            class: nginx
            ingressTemplate:
              metadata:
                annotations:
                  kubernetes.io/ingress.class: nginx
      - selector:
          dnsZones:
            - "itconnectmatrimony.com"
        dns01:
          route53:
            region: us-east-1
            hostedZoneID: ${ROUTE53_ZONE_ID}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: it-connect-tls
  namespace: it-connect
spec:
  secretName: it-connect-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - itconnectmatrimony.com
    - www.itconnectmatrimony.com
    - api.itconnectmatrimony.com
    - admin.itconnectmatrimony.com
  secretTemplate:
    annotations:
      cert-manager.io/alt-names: "itconnectmatrimony.com,www.itconnectmatrimony.com,api.itconnectmatrimony.com,admin.itconnectmatrimony.com"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ssl-config
  namespace: it-connect
  labels:
    app: ingress
    component: ssl
data:
  ssl-protocols: "TLSv1.2 TLSv1.3"
  ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
  ssl-session-cache: "shared:SSL:10m"
  ssl-session-timeout: "1d"
  ssl-session-tickets: "false"
  ssl-stapling: "true"
  ssl-stapling-verify: "true"
  hsts-max-age: "31536000"
  hsts-include-subdomains: "true"
  hsts-preload: "true"
