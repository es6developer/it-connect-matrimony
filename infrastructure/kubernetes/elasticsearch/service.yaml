apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: it-connect
  labels:
    app: elasticsearch
    component: search
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 9200
      targetPort: 9200
      protocol: TCP
    - name: transport
      port: 9300
      targetPort: 9300
      protocol: TCP
  selector:
    app: elasticsearch
