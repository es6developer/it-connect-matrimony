apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: it-connect
  labels:
    app: mysql
    component: database
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
      protocol: TCP
  selector:
    app: mysql
  publishNotReadyAddresses: true
