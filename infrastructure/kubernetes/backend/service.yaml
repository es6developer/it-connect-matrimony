apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: it-connect
  labels:
    app: backend
    component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "4000"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4000
      targetPort: 4000
      protocol: TCP
  selector:
    app: backend
  sessionAffinity: None
