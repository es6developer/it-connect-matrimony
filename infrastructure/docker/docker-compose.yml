version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-common-env: &common-env
  NODE_ENV: production
  TZ: UTC

services:
  mysql:
    image: mysql:8.0
    container_name: it-connect-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-it_connect}
      MYSQL_USER: ${MYSQL_USER:-itconnect}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-itconnect123}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - it-connect-network

  redis:
    image: redis:7-alpine
    container_name: it-connect-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    networks:
      - it-connect-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: it-connect-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    environment:
      - cluster.name=it-connect-cluster
      - node.name=it-connect-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - ingest.geoip.downloader.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging: *default-logging
    networks:
      - it-connect-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: it-connect-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-itconnect}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-rabbitmqpassword}
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-SWQOKODSQALRPCLNMEQG}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging: *default-logging
    networks:
      - it-connect-network

  backend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.backend
    container_name: it-connect-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      <<: *common-env
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: ${MYSQL_USER:-itconnect}
      DB_PASSWORD: ${MYSQL_PASSWORD:-itconnect123}
      DB_DATABASE: ${MYSQL_DATABASE:-it_connect}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispassword}
      ELASTICSEARCH_NODE: http://elasticsearch:9200
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-itconnect}:${RABBITMQ_PASSWORD:-rabbitmqpassword}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      MEDIA_BUCKET: ${MEDIA_BUCKET}
      SENTRY_DSN: ${SENTRY_DSN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    logging: *default-logging
    networks:
      - it-connect-network

  web:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.web
    container_name: it-connect-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      <<: *common-env
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.itconnectmatrimony.com}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://api.itconnectmatrimony.com}
      INTERNAL_API_URL: http://backend:4000
    depends_on:
      - backend
    logging: *default-logging
    networks:
      - it-connect-network

  admin:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.admin
    container_name: it-connect-admin
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      <<: *common-env
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.itconnectmatrimony.com}
      INTERNAL_API_URL: http://backend:4000
    depends_on:
      - backend
    logging: *default-logging
    networks:
      - it-connect-network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: it-connect-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
      - nginx-logs:/var/log/nginx
    depends_on:
      - web
      - admin
      - backend
    logging: *default-logging
    networks:
      - it-connect-network

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  elasticsearch-data:
    driver: local
  rabbitmq-data:
    driver: local
  backend-uploads:
    driver: local
  backend-logs:
    driver: local
  nginx-cache:
    driver: local
  nginx-logs:
    driver: local

networks:
  it-connect-network:
    driver: bridge
