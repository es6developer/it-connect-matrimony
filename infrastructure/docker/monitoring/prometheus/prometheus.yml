global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    environment: production
    cluster: it-connect

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      scheme: http
      timeout: 10s

rule_files:
  - "alerts/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: prometheus
          component: monitoring

  - job_name: "backend"
    scrape_interval: 10s
    metrics_path: /api/metrics
    static_configs:
      - targets: ["backend:4000"]
        labels:
          service: backend
          component: api
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__meta_docker_container_name]
        target_label: container

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          service: node-exporter
          component: infrastructure

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis
          component: cache

  - job_name: "mysql"
    static_configs:
      - targets: ["mysql-exporter:9104"]
        labels:
          service: mysql
          component: database

  - job_name: "rabbitmq"
    metrics_path: /metrics
    static_configs:
      - targets: ["rabbitmq:15692"]
        labels:
          service: rabbitmq
          component: message-queue

  - job_name: "elasticsearch"
    static_configs:
      - targets: ["elasticsearch:9200"]
        labels:
          service: elasticsearch
          component: search

  - job_name: "nginx"
    static_configs:
      - targets: ["nginx:9113"]
        labels:
          service: nginx
          component: reverse-proxy

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          service: cadvisor
          component: container-monitoring
